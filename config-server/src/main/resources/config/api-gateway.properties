spring.application.name=api-gateway
server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

spring.cloud.gateway.discovery.locator.enabled=false

spring.cloud.gateway.routes[0].id=auth-public-and-core
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/register,/login,/logout,/verify-login-otp,/mfa

spring.cloud.gateway.routes[1].id=auth-role-admin
spring.cloud.gateway.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/admin/dashboard,/api/admin/users

spring.cloud.gateway.routes[2].id=auth-role-advisor
spring.cloud.gateway.routes[2].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/advisor/clients,/api/advisor/recommendations

spring.cloud.gateway.routes[3].id=auth-role-investor
spring.cloud.gateway.routes[3].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/investor/portfolio,/api/investor/trading

spring.cloud.gateway.routes[4].id=portfolio-admin
spring.cloud.gateway.routes[4].uri=lb://PORTFOLIO-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/admin/portfolios/**

spring.cloud.gateway.routes[5].id=portfolio-advisor
spring.cloud.gateway.routes[5].uri=lb://PORTFOLIO-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/advisor/portfolios/**

spring.cloud.gateway.routes[6].id=admin-service
spring.cloud.gateway.routes[6].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[7].id=investor-service
spring.cloud.gateway.routes[7].uri=lb://INVESTOR-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/investor/**

spring.cloud.gateway.routes[8].id=portfolio-service
spring.cloud.gateway.routes[8].uri=lb://PORTFOLIO-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/portfolios/**

spring.cloud.gateway.routes[9].id=advisor-service
spring.cloud.gateway.routes[9].uri=lb://ADVISOR
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/advisor/**

spring.cloud.gateway.routes[10].id=notification-service-api
spring.cloud.gateway.routes[10].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[11].id=notification-service-legacy
spring.cloud.gateway.routes[11].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[11].predicates[0]=Path=/notification/**

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

