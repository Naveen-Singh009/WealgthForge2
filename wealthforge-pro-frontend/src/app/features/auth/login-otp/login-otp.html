<div class="auth-page">
  <div class="auth-panel wf-card">
    <h2>Verify OTP</h2>
    <p>Enter the 6-digit OTP sent to {{ otpEmail }}.</p>
    <div class="alert py-2 mb-3" [ngClass]="authMessageVariant === 'warning' ? 'alert-warning' : 'alert-danger'" *ngIf="authMessage">
      {{ authMessage }}
    </div>

    <form [formGroup]="otpForm" (ngSubmit)="submit()" novalidate>
      <div class="mb-3">
        <label class="form-label" for="loginOtp">One-Time Password</label>
        <input id="loginOtp" type="text" maxlength="6" class="form-control" formControlName="otp" />
        <small class="text-danger" *ngIf="otp.touched && otp.invalid">
          Enter a valid 6-digit OTP.
        </small>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-emerald flex-grow-1" type="submit" [disabled]="submitting">
          {{ submitting ? 'Verifying...' : 'Verify OTP' }}
        </button>
        <button class="btn btn-outline-light" type="button" (click)="backToLogin()" [disabled]="submitting">
          Back
        </button>
      </div>
    </form>
  </div>
</div>
